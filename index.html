<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOlyze - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Router link active state styling */
        .router-link-active {
            color: #ff8f00;
            font-weight: 600;
        }
        .router-link-exact-active {
            color: #ff8f00;
        }

        /* Smooth page transitions */
        router-view {
            display: block;
            flex-grow: 1;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="app" class="flex min-h-screen bg-[#f3f4f6]">
        <!-- Mobile Overlay Backdrop -->
        <div 
            id="sidebar-overlay"
            class="fixed inset-0 bg-black/60 z-[400] transition-opacity duration-300 md:hidden pointer-events-none opacity-0"
            @click="toggleSidebar"
        ></div>

        <!-- LEFT: Sidebar Navigation -->
        <my-sidebar 
            :menu="menu" 
            :stats="stats" 
            :active-id="$route.meta.sidebarId"
            :open="isSidebarOpen"
            @close="toggleSidebar"
            @nav-click="handleNavClick"
        ></my-sidebar>

        <!-- RIGHT: Main Content Dynamic Area -->
        <div class="flex-grow flex flex-col h-screen overflow-hidden">
            <!-- Global Navbar -->
            <my-navbar 
                user-name="Zubia Sheraz" 
                user-role="User" 
                notifications
                @toggle-sidebar="toggleSidebar"
            ></my-navbar>

            <!-- Router View — Pages render here -->
            <router-view></router-view>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
